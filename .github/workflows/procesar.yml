name: Procesar Contenedores a Sheets

on:
  workflow_dispatch:
  schedule:
    # Ejecutar todos los días a las 10:13 AM (Hora Chile UTC-3 = 13:13 UTC)
    - cron: '13 13 * * *'

jobs:
  procesar:
    # CLAVE: Cambiamos ubuntu-latest por self-hosted
    runs-on: self-hosted
    
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar procesamiento
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python procesar.py

      - name: Guardar historial de procesados
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add processed.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualizar historial de contenedores procesados"
          git push
