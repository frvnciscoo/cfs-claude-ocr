name: Procesar Contenedores (Prueba Local)

on:
  workflow_dispatch: # Perfecto para ejecutarlo a mano cuando subas fotos

permissions:
  contents: write # Necesario para guardar el Excel de vuelta en el repo

jobs:
  procesar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar procesamiento
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python procesar.py

      - name: Guardar resultados en GitHub
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add reporte.xlsx processed.json
          # Comprueba si hay cambios antes de hacer commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "Actualizar reporte de contenedores" && git push)
